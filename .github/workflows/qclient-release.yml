name: qclient release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: Artifact version. Leave blank to use config/version.go.
        required: false
        type: string

permissions:
  contents: read

jobs:
  metadata:
    name: Metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [[ -n "${INPUT_VERSION:-}" ]]; then
            version="$INPUT_VERSION"
          else
            version="$(grep -A 1 'func GetVersion() \[\]byte {' config/version.go | grep -Eo '0x[0-9a-fA-F]+' | xargs printf '%d.%d.%d')"
          fi
          if [[ ! "$version" =~ ^[0-9]+(\.[0-9]+){2,3}$ ]]; then
            echo "version must use numeric dotted format, for example 2.1.0.23" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Resolved qclient version: $version"

  linux-amd64:
    name: Build linux-amd64
    runs-on: ubuntu-latest
    needs:
      - metadata
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Build qclient
        shell: bash
        run: |
          set -euo pipefail
          docker build --ulimit stack=-1:-1 --platform linux/amd64 -f docker/Dockerfile.source --output client/build/amd64_linux --target=qclient .

      - name: Stage artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          install -m 0755 client/build/amd64_linux/qclient "release/qclient-${{ needs.metadata.outputs.version }}-linux-amd64"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qclient-linux-amd64
          path: release/qclient-${{ needs.metadata.outputs.version }}-linux-amd64
          if-no-files-found: error

  darwin-arm64:
    name: Build darwin-arm64
    runs-on: macos-14
    needs:
      - metadata
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.5'

      - name: Prepare build tools
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$(uname -m)" != "arm64" ]]; then
            echo "darwin-arm64 build requires an arm64 macOS runner" >&2
            exit 1
          fi
          brew update
          brew install autoconf automake cmake gmp libtool mpfr openssl@3 pkg-config protobuf
          emp_prefix="$RUNNER_TEMP/emp-static"
          openssl_prefix="$(brew --prefix openssl@3)"
          cmake -S emp-tool -B "$RUNNER_TEMP/emp-tool-build" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$emp_prefix" \
            -DCMAKE_PREFIX_PATH="$emp_prefix" \
            -DOPENSSL_ROOT_DIR="$openssl_prefix"
          cmake --build "$RUNNER_TEMP/emp-tool-build" --target emp-tool --parallel "$(sysctl -n hw.ncpu)"
          cmake --install "$RUNNER_TEMP/emp-tool-build"
          cmake -S emp-ot -B "$RUNNER_TEMP/emp-ot-build" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$emp_prefix" \
            -DCMAKE_PREFIX_PATH="$emp_prefix" \
            -DOPENSSL_ROOT_DIR="$openssl_prefix"
          cmake --install "$RUNNER_TEMP/emp-ot-build"
          test -f "$emp_prefix/lib/libemp-tool.a"
          test -d "$emp_prefix/include/emp-ot"
          echo "EMP_DIR=$emp_prefix" >> "$GITHUB_ENV"
          git clone --branch flint-3.0 --depth 1 https://github.com/flintlib/flint.git "$RUNNER_TEMP/flint"
          pushd "$RUNNER_TEMP/flint"
          ./bootstrap.sh
          ./configure \
            --prefix="$RUNNER_TEMP/flint-static" \
            --with-gmp="$(brew --prefix gmp)" \
            --with-mpfr="$(brew --prefix mpfr)" \
            --enable-static \
            --disable-shared \
            CFLAGS="-O3 -fPIC"
          make -j"$(sysctl -n hw.ncpu)"
          make install
          popd
          echo "FLINT_DIR=$RUNNER_TEMP/flint-static" >> "$GITHUB_ENV"
          go install github.com/go-task/task/v3/cmd/task@latest
          cargo install uniffi-bindgen-go --git https://github.com/NordSecurity/uniffi-bindgen-go --tag 'v0.4.0+v0.28.3'
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build qclient
        shell: bash
        run: |
          set -euo pipefail
          task build_qclient_arm64_macos

      - name: Stage artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          install -m 0755 client/build/arm64_macos/qclient "release/qclient-${{ needs.metadata.outputs.version }}-darwin-arm64"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qclient-darwin-arm64
          path: release/qclient-${{ needs.metadata.outputs.version }}-darwin-arm64
          if-no-files-found: error

  sign:
    name: Sign and verify
    runs-on: ubuntu-latest
    needs:
      - metadata
      - linux-amd64
      - darwin-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.5'

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Sign artifacts
        shell: bash
        env:
          DEV_NODE_SIGNING_PRIVATE_KEY: ${{ secrets.DEV_NODE_SIGNING_PRIVATE_KEY }}
          QCLIENT_RELEASE_BASE_URL: ${{ vars.QCLIENT_RELEASE_BASE_URL }}
        run: |
          set -euo pipefail
          scripts/sign-qclient-artifacts.sh "${{ needs.metadata.outputs.version }}" dist

      - name: Upload signed bundle
        uses: actions/upload-artifact@v4
        with:
          name: qclient-release-${{ needs.metadata.outputs.version }}
          path: |
            dist/qclient-release
            dist/qclient-version.json
            dist/qclient-${{ needs.metadata.outputs.version }}-*
          if-no-files-found: error
